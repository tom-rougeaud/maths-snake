  <meta charset="utf-8">

  <title>Maths Snake</title>
  <style>

  <div id="wrap"><canvas id="game" width="1400" height="1036"></canvas></div>

<script>
(() => {
  // ============================
  // Canvas + DPR
  // ============================
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha:false });

  let DPR=1, W=0, H=0;

  function resize(){
    const r = canvas.getBoundingClientRect();
    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    W = Math.max(420, Math.floor(r.width * DPR));
    H = Math.max(420, Math.floor(r.height * DPR));
    canvas.width = W;
    canvas.height = H;
    recalcLayout();
    buildFixedObstacles();
  }
  window.addEventListener("resize", resize);

  // ============================
  // Helpers
  // ============================
  const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
  const randInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const fmt=(n)=>{
    if(typeof n!=="number"||!isFinite(n)) return String(n);
    if(Number.isInteger(n)) return String(n);
    return (Math.round(n*100)/100).toFixed(2).replace(/\.?0+$/,"");
  };
  const eqNum=(a,b)=>Math.abs(a-b)<1e-9;

  function pad2(x){ return String(x).padStart(2,"0"); }
  function nowStampFR(){
    const d=new Date();
    return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }
  function escapeCSV(s){
    const str=String(s??"");
    if(/[;"\n]/.test(str)) return `"${str.replace(/"/g,'""')}"`;
    return str;
  }
  function safeFileName(s){ return String(s).replace(/[^\w\-\.]+/g,"_"); }
  function downloadBlob(text,mime,filename){
    const blob=new Blob([text],{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  // ============================
  // Audio (WebAudio, sans fichiers)
  // ============================
  let audioCtx=null;
  function ensureAudio(){
    if(audioCtx) return;
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC) return;
    audioCtx=new AC();
  }
  function beep(freq=880,dur=0.08,type="sine",gain=0.06){
    if(!audioCtx) return;
    const t0=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type=type;
    osc.frequency.setValueAtTime(freq,t0);
    g.gain.setValueAtTime(gain,t0);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }
  function sfxBon(){ beep(880,0.07,"sine",0.07); beep(1175,0.08,"sine",0.06); }
  function sfxFaux(){ beep(220,0.12,"square",0.05); beep(170,0.14,"square",0.05); }

  // ============================
  // UI (Canvas only) + hit test
  // ============================
  let ui=[];
  function clearUI(){ ui=[]; }
  function addUI(e){ ui.push(e); }
  function hit(px,py){
    for(let i=ui.length-1;i>=0;i--){
      const e=ui[i];
      if(px>=e.x&&px<=e.x+e.w&&py>=e.y&&py<=e.y+e.h) return e;
    }
    return null;
  }
  function roundRect(x,y,w,h,r){
    const rr=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr,y);
    ctx.arcTo(x+w,y,x+w,y+h,rr);
    ctx.arcTo(x+w,y+h,x,y+h,rr);
    ctx.arcTo(x,y+h,x,y,rr);
    ctx.arcTo(x,y,x+w,y,rr);
    ctx.closePath();
  }
  function drawCard(x,y,w,h,alpha=0.92){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle="rgba(255,255,255,0.92)";
    ctx.strokeStyle="rgba(0,0,0,0.10)";
    ctx.lineWidth=2;
    roundRect(x,y,w,h,16*DPR);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  function drawButton(id,x,y,w,h,label,opt={}){
    const {primary=false,disabled=false,alpha=0.72}=opt;
    ctx.save();
    ctx.globalAlpha=disabled?alpha*0.55:alpha;
    ctx.fillStyle=primary?"rgba(17,17,17,0.92)":"rgba(255,255,255,0.90)";
    ctx.strokeStyle=primary?"rgba(17,17,17,0.92)":"rgba(0,0,0,0.14)";
    ctx.lineWidth=2;
    roundRect(x,y,w,h,14*DPR);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle=primary?"#fff":"#111";
    ctx.font=`900 ${Math.floor(14*DPR)}px system-ui`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(label,x+w/2,y+h/2);
    ctx.restore();
    addUI({id,type:"button",x,y,w,h,disabled});
  }
  function drawSlider(id,x,y,w,h,label,value01,leftLabel,rightLabel,opt={}){
    const {alpha=0.90}=opt;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle="rgba(255,255,255,0.90)";
    ctx.strokeStyle="rgba(0,0,0,0.14)";
    ctx.lineWidth=2;
    roundRect(x,y,w,h,14*DPR);
    ctx.fill(); ctx.stroke();

    const pad=12*DPR;
    ctx.fillStyle="#111";
    ctx.font=`900 ${Math.floor(13*DPR)}px system-ui`;
    ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillText(label,x+pad,y+8*DPR);

    const railX=x+pad, railY=y+34*DPR, railW=w-2*pad, railH=8*DPR;
    ctx.fillStyle="rgba(0,0,0,0.10)";
    roundRect(railX,railY,railW,railH,999); ctx.fill();

    const kx=railX+value01*railW, ky=railY+railH/2;
    ctx.fillStyle="rgba(17,17,17,0.92)";
    ctx.beginPath(); ctx.arc(kx,ky,10*DPR,0,Math.PI*2); ctx.fill();

    ctx.fillStyle="rgba(0,0,0,0.60)";
    ctx.font=`800 ${Math.floor(11*DPR)}px system-ui`;
    ctx.textBaseline="bottom";
    ctx.textAlign="left";
    if(leftLabel) ctx.fillText(leftLabel,railX,y+h-8*DPR);
    ctx.textAlign="right";
    if(rightLabel) ctx.fillText(rightLabel,railX+railW,y+h-8*DPR);

    ctx.restore();
    addUI({id,type:"slider",x,y,w,h,value01});
  }
  function drawTextInput(id,x,y,w,h,label,value,focused,opt={}){
    const {alpha=0.90}=opt;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.fillStyle="rgba(255,255,255,0.90)";
    ctx.strokeStyle=focused?"rgba(17,17,17,0.70)":"rgba(0,0,0,0.14)";
    ctx.lineWidth=2;
    roundRect(x,y,w,h,14*DPR);
    ctx.fill(); ctx.stroke();

    const pad=12*DPR;
    ctx.fillStyle="rgba(0,0,0,0.65)";
    ctx.font=`900 ${Math.floor(12*DPR)}px system-ui`;
    ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillText(label,x+pad,y+8*DPR);

    ctx.fillStyle="#111";
    ctx.font=`900 ${Math.floor(16*DPR)}px system-ui`;
    ctx.textBaseline="top";
    const show=value.length?value:"…";
    ctx.globalAlpha=value.length?alpha:alpha*0.45;
    ctx.fillText(show,x+pad,y+28*DPR);
    ctx.globalAlpha=alpha;

    if(focused){
      const blink=(Math.floor(Date.now()/450)%2)===0;
      if(blink){
        const m=ctx.measureText(value);
        const cx=x+pad+m.width+2*DPR;
        const cy=y+28*DPR;
        ctx.strokeStyle="rgba(17,17,17,0.90)";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(cx,cy+2*DPR);
        ctx.lineTo(cx,cy+18*DPR);
        ctx.stroke();
      }
    }
    ctx.restore();
    addUI({id,type:"input",x,y,w,h});
  }

  // ============================
  // Layout zones
  // ============================
  let CELL=24, COLS=24, ROWS=24;
  let topBarH=0;        // interface “hors salle” AU-DESSUS du tableau
  let boardH=0;         // tableau (zone question)
  let marginEdge=0;     // 15%
  let playTopY=0;       // zone parquet autorisée (sous tableau)
  let boardCells=0;

  let boardRect = {x:0,y:0,w:0,h:0};

  function recalcLayout(){
    CELL=clamp(Math.floor(Math.min(W,H)/30),18,34);
    COLS=Math.floor(W/CELL);
    ROWS=Math.floor(H/CELL);

    topBarH=Math.floor(H*0.10);   // zone UI hors salle
    boardH=Math.floor(H*0.16);    // hauteur “réservée” au tableau
    marginEdge=Math.floor(Math.min(W,H)*0.15);

    playTopY=topBarH+boardH;
    boardCells=Math.ceil((topBarH+boardH)/CELL);
  }

  // ============================
  // Screens
  // ============================
  const SC={MENU1:"MENU1",MENU2:"MENU2",PLAY:"PLAY",PAUSE:"PAUSE",FIN:"FIN",CRASH:"CRASH"};
  let screen=SC.MENU1;
  let crashMsg="";

  // ============================
  // Chapitres (checkbox)
  // ============================
  const CHAPS=[
    {key:"EQUATION", label:"Équations"},
    {key:"POURCENTAGES", label:"Pourcentages"},
    {key:"CALCUL_MENTAL", label:"Calcul mental"},
    {key:"CONVERSIONS", label:"Conversions"},
    {key:"CARRE", label:"Carrés / Racines"},
  ];
  let chapEnabled = new Map(CHAPS.map(c=>[c.key,true])); // défaut : tous cochés

  function enabledChaptersList(){
    const a=[];
    for(const c of CHAPS) if(chapEnabled.get(c.key)) a.push(c.key);
    // sécurité : au moins 1
    if(a.length===0) a.push("CALCUL_MENTAL");
    return a;
  }

  function pickChap(){
    const a=enabledChaptersList();
    return a[randInt(0,a.length-1)];
  }

  // ============================
  // Settings
  // ============================
  let studentName="";
  let studentClass="";
  let focusedInput=null;

  // Chrono 20..60 (défaut 30)
  let chrono01= (30-20)/(60-20);

  // Difficulté 1..5 (défaut 1) — auto +1 toutes les 5 bonnes réponses
  let diffLevel=1;
  let diff01=0;

  // Vitesse 350..20ms (défaut 150)
  let speed01 = (350-150)/(350-20);

  // Vies (on garde 3 fixes pour simplicité + robustesse)
  let livesFixed=3;

  // Fullscreen at start
  let autoFullscreen=true;

  // Best score global (affiché en HUD)
  const BEST_KEY="maths_snake_best_global";
  function bestScore(){ return Number(localStorage.getItem(BEST_KEY)||0); }
  function setBest(v){ localStorage.setItem(BEST_KEY, String(v)); }

  function sliderToChrono(v01){ return Math.round(20 + v01*(60-20)); }
  function sliderToDiff(v01){ return clamp(1 + Math.round(v01*4), 1, 5); }
  function sliderToTickMs(v01){
    // left slow(350) -> right fast(20)
    const slow=350, fast=20;
    return Math.round(slow - v01*(slow-fast));
  }

  function getChrono(){ return sliderToChrono(chrono01); }
  function getDiff(){ return diffLevel; }
  function getTickManual(){ return sliderToTickMs(speed01); }

  // ============================
  // Obstacles: interdit haut + tables + meubles + prof
  // ============================
  let obstacles=[]; // {kind,x,y,w,h} in cells
  let prof=null;

  function buildFixedObstacles(){
    obstacles=[];

    // zone interdite topbar+tableau
    obstacles.push({kind:"interdit_haut", x:0, y:0, w:COLS, h:boardCells});

    // meubles verticaux (bords extérieurs)
    const edgeW = clamp(Math.floor(COLS*0.06), 2, 4);
    const topSafe = boardCells + 2;
    const bottomSafe = ROWS - 1 - Math.ceil(marginEdge/CELL);

    // gauche
    obstacles.push({kind:"meuble", x:0, y:topSafe, w:edgeW, h:bottomSafe-topSafe});
    // droite
    obstacles.push({kind:"meuble", x:COLS-edgeW, y:topSafe, w:edgeW, h:bottomSafe-topSafe});

    // 9 tables (3x3) un peu plus écartées
    const leftMarginCell = Math.ceil(marginEdge / CELL) + edgeW;
    const rightMarginCell = COLS - 1 - Math.ceil(marginEdge / CELL) - edgeW;

    const topAllowedCell = Math.max(boardCells + 2, Math.ceil(marginEdge/CELL));
    const bottomAllowedCell = ROWS - 1 - Math.ceil(marginEdge/CELL);

    const usableLeft = leftMarginCell;
    const usableRight = rightMarginCell;
    const usableTop = topAllowedCell;
    const usableBottom = bottomAllowedCell;

    const cols=3, rows=3;

    const tableW = clamp(Math.floor(COLS*0.16), 5, 8);
    const tableH = clamp(Math.floor(ROWS*0.10), 3, 6);

    const usableW = usableRight-usableLeft+1;
    const usableH = usableBottom-usableTop+1;

    // +1 gap compared to previous
    const totalW = cols*tableW;
    const gapX = Math.max(3, Math.floor((usableW - totalW)/(cols+1)));
    const startX = usableLeft + gapX;

    const totalH = rows*tableH;
    const gapY = Math.max(3, Math.floor((usableH - totalH)/(rows+1)));
    const startY = usableTop + gapY;

    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const x = startX + c*(tableW+gapX);
        const y = startY + r*(tableH+gapY);
        obstacles.push({kind:"table", x,y,w:tableW,h:tableH});
      }
    }

    // Prof juste sous tableau (2x2) mais emoji 2x plus grand visuellement
    const px = Math.floor(COLS/2) - 1;
    const py = boardCells;
    prof = {kind:"prof", x:px, y:py, w:2, h:2};
    obstacles.push(prof);
  }

  function cellInObstacle(cx,cy){
    for(const o of obstacles){
      if(cx>=o.x && cx<o.x+o.w && cy>=o.y && cy<o.y+o.h) return true;
    }
    return false;
  }

  // ============================
  // Questions
  // ============================
  function bandFromDiff(){
    if(diffLevel<=2) return "easy";
    if(diffLevel<=4) return "medium";
    return "hard";
  }
  function q(text, ans, chap){ return {text, answer:ans, chap}; }

  function generateQuestion(){
    const chap = pickChap();
    const d = bandFromDiff();

    if(chap==="EQUATION"){
      if(d==="easy"){
        if(randInt(0,1)===0){ const x=randInt(5,60),a=randInt(5,25),b=x+a; return q(`x + ${a} = ${b}`, x, chap); }
        const x=randInt(8,70),a=randInt(5,25),b=x-a; return q(`x - ${a} = ${b}`, x, chap);
      }
      if(d==="medium"){
        const a=randInt(2,6),x=randInt(5,30),b=randInt(-20,20),c=a*x+b;
        const bTxt=b>=0?` + ${b}`:` - ${Math.abs(b)}`;
        return q(`${a}x${bTxt} = ${c}`, x, chap);
      }
      if(randInt(0,1)===0){
        const a=randInt(2,7),x=randInt(5,40),b=randInt(-10,15),c=a*(x+b);
        const bTxt=b>=0?` + ${b}`:` - ${Math.abs(b)}`;
        return q(`${a}(x${bTxt}) = ${c}`, x, chap);
      } else {
        const k=randInt(2,8); let x=randInt(12,80); x-=x%k;
        const b=randInt(-10,20),c=x/k+b;
        const bTxt=b>=0?` + ${b}`:` - ${Math.abs(b)}`;
        return q(`x / ${k}${bTxt} = ${c}`, x, chap);
      }
    }

    if(chap==="POURCENTAGES"){
      if(d==="easy"){
        if(randInt(0,1)===0){
          const p=[10,15,20,25,30,40,50][randInt(0,6)];
          const n=randInt(2,20)*10;
          return q(`${p}% de ${n} = ?`, (p/100)*n, chap);
        } else {
          const p=[5,8,10,12,15,20][randInt(0,5)];
          const n=randInt(5,30)*10;
          return q(`Augmentation de ${p}% sur ${n} = ?`, n*(1+p/100), chap);
        }
      }
      if(d==="medium"){
        const p=[12,15,18,20,25,30][randInt(0,5)];
        const n=randInt(8,60)*5;
        if(randInt(0,1)===0) return q(`Baisse de ${p}% sur ${n} = ?`, n*(1-p/100), chap);
        return q(`Augmentation de ${p}% sur ${n} = ?`, n*(1+p/100), chap);
      }
      if(randInt(0,1)===0){
        const p=[10,12,15,20,25,30][randInt(0,5)];
        const initial=randInt(50,300);
        const final=Math.round(initial*(1+p/100)*100)/100;
        return q(`Après une augmentation de ${p}%, le prix devient ${fmt(final)}.\nPrix initial = ?`, initial, chap);
      } else {
        const A=randInt(40,250);
        const p=[5,8,10,12,15,20,25,30][randInt(0,7)];
        const inc=Math.random()<0.6;
        const B=Math.round((inc?A*(1+p/100):A*(1-p/100))*100)/100;
        const sign=inc?"augmentation":"baisse";
        return q(`De ${A} à ${fmt(B)} :\nQuel est le % de ${sign} ?`, p, chap);
      }
    }

    if(chap==="CALCUL_MENTAL"){
      if(d==="easy"){
        const a=randInt(5,80),b=randInt(5,80);
        if(randInt(0,1)===0) return q(`${a} + ${b} = ?`, a+b, chap);
        const A=Math.max(a,b),B=Math.min(a,b);
        return q(`${A} - ${B} = ?`, A-B, chap);
      }
      if(d==="medium"){
        const t=randInt(1,4);
        if(t===1){ const a=randInt(6,25),b=randInt(2,12); return q(`${a} × ${b} = ?`, a*b, chap); }
        if(t===2){ const a=randInt(10,90); return q(`Double de ${a} = ?`, 2*a, chap); }
        if(t===3){ const a=randInt(20,120); return q(`Moitié de ${a} = ?`, a/2, chap); }
        const a=randInt(2,9),n=randInt(2,25)*10;
        return q(`${n} × ${a} = ?`, n*a, chap);
      }
      const t=randInt(1,3);
      if(t===1){ const a=randInt(2,12),b=randInt(2,12),c=randInt(5,40); return q(`${a} × ${b} + ${c} = ?`, a*b+c, chap); }
      if(t===2){ const b=randInt(2,6),a=randInt(6,30)*b,c=randInt(5,30); return q(`${a} ÷ ${b} + ${c} = ?`, a/b+c, chap); }
      const a=randInt(2,10),b=randInt(2,10),c=randInt(2,10);
      return q(`(${a} + ${b}) × ${c} = ?`, (a+b)*c, chap);
    }

    if(chap==="CONVERSIONS"){
      if(d==="easy"){
        const t=randInt(1,3);
        if(t===1){ const g=randInt(2,90)*100; return q(`${g} g = ? kg`, g/1000, chap); }
        if(t===2){ const kg=randInt(1,30); return q(`${kg} kg = ? g`, kg*1000, chap); }
        const cm=randInt(50,900); return q(`${cm} cm = ? m`, cm/100, chap);
      }
      if(d==="medium"){
        const t=randInt(1,3);
        if(t===1){ const ml=randInt(5,95)*100; return q(`${ml} mL = ? L`, ml/1000, chap); }
        if(t===2){ const L=randInt(1,9)+randInt(0,9)/10; return q(`${fmt(L)} L = ? mL`, Math.round(L*1000), chap); }
        const min=randInt(30,240); return q(`${min} min = ? h`, min/60, chap);
      }
      const t=randInt(1,3);
      if(t===1){ const km=randInt(1,25)+randInt(0,9)/10; return q(`${fmt(km)} km = ? m`, Math.round(km*1000), chap); }
      if(t===2){ const m=randInt(120,4800); return q(`${m} m = ? km`, m/1000, chap); }
      const sec=randInt(90,5400); return q(`${sec} s = ? min`, sec/60, chap);
    }

    if(chap==="CARRE"){
      if(d==="easy"){ const n=randInt(1,15); return q(`${n}² = ?`, n*n, chap); }
      if(d==="medium"){ const n=randInt(12,25); return q(`${n}² = ?`, n*n, chap); }
      if(randInt(0,2)===0){ const n=randInt(20,40); return q(`${n}² = ?`, n*n, chap); }
      const n=randInt(10,35); return q(`√${n*n} = ?`, n, chap);
    }

    return q("x + 5 = 9", 4, "CALCUL_MENTAL");
  }

  function generateChoices(qObj){
    const a=Math.round(Number(qObj.answer)*100)/100;
    const set=new Set();
    const add=(v)=>set.add(Math.round(Number(v)*100)/100);
    add(a);

    const m=qObj.chap;
    if(m==="POURCENTAGES"){ add(a+10); add(a-10); add(a*0.9); add(a*1.1); add(a*2); }
    else if(m==="EQUATION"){ add(a+1); add(a-1); add(-a); add(a+5); }
    else if(m==="CONVERSIONS"){ add(a*10); add(a/10); add(a*100); add(a/100); add(a*1000); add(a/1000); }
    else if(m==="CARRE"){ add(a+2); add(a-2); const r=Math.round(Math.sqrt(Math.max(0,a))); add(r); add(r*2); }
    else { add(a+2); add(a-2); add(a*2); add(a/2); }

    while(set.size<4){
      const jitter=(Math.random()<0.75)?randInt(-12,12):randInt(-40,40);
      add(a+jitter);
    }

    const arr=[...set].slice(0,4);
    for(let i=arr.length-1;i>0;i--){ const j=randInt(0,i); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
  }

  // ============================
  // Forbidden rects for answers placement
  // ============================
  function rectsOverlap(a,b){
    return !(a.x+a.w < b.x || b.x+b.w < a.x || a.y+a.h < b.y || b.y+b.h < a.y);
  }
  function inflateRect(r,p){ return {x:r.x-p,y:r.y-p,w:r.w+2*p,h:r.h+2*p}; }
  function obstacleRectsPx(){
    const rects=[];
    for(const o of obstacles){
      rects.push({x:o.x*CELL,y:o.y*CELL,w:o.w*CELL,h:o.h*CELL});
    }
    // margins 15%
    rects.push({x:0,y:0,w:marginEdge,h:H});
    rects.push({x:W-marginEdge,y:0,w:marginEdge,h:H});
    rects.push({x:0,y:0,w:W,h:marginEdge});
    rects.push({x:0,y:H-marginEdge,w:W,h:marginEdge});
    // bubble obstacle (si actif)
    if(bubbleRectPx) rects.push({...bubbleRectPx});
    return rects;
  }
  function uiRectsPx(){
    const rects=[];
    for(const e of ui){
      if(["button","slider","input","check"].includes(e.type)){
        rects.push({x:e.x,y:e.y,w:e.w,h:e.h});
      }
    }
    return rects;
  }
  function snakeCentersPx(){
    const centers=[];
    for(const s of snake){
      centers.push({x:s.x*CELL + CELL/2, y:s.y*CELL + CELL/2});
    }
    return centers;
  }

  function spawnAnswers(){
    // hard reset (never keep stale)
    answers=[];
    cheat194Active = cheat194Active; // keep
    correctHighlight = cheat194Active;

    const choices=generateChoices(currentQ);
    const correct=Math.round(Number(currentQ.answer)*100)/100;

    const aw=Math.max(1.8*CELL, 56*DPR);
    const ah=Math.max(1.4*CELL, 46*DPR);

    // circle hitbox
    const rAnswer = 0.46 * Math.min(aw,ah);

    // bigger safe padding away from obstacles (per your last request)
    let inflatePad = 22*DPR;

    // 1) spacing among answers
    let minDist = 4.6 * Math.max(aw,ah);
    // 2) spacing from snake
    let minSnakeDist = 4.6 * Math.max(aw,ah);
    // 3) anti-alignment
    let minDx = 2.4 * aw;
    let minDy = 2.4 * ah;

    const baseForbidden = obstacleRectsPx();

    function centerOf(r){ return {x:r.x+r.w/2, y:r.y+r.h/2}; }
    function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

    // spawn zone excludes: close to board/prof/bubble/obstacles by inflatePad already
    function randomCandidate(){
      const x=randInt(marginEdge + aw/2, W - marginEdge - aw/2);
      const y=randInt(playTopY + ah/2, H - marginEdge - ah/2);
      return { x:x-aw/2, y:y-ah/2, w:aw, h:ah };
    }

    // fallback safe points (grid), computed once per spawn
    const fallback=[];
    {
      const gx = Math.max(marginEdge + aw/2, marginEdge + 2*aw);
      const gx2 = W - Math.max(marginEdge + aw/2, marginEdge + 2*aw);
      const gy = Math.max(playTopY + ah/2, playTopY + 2*ah);
      const gy2 = H - Math.max(marginEdge + ah/2, marginEdge + 2*ah);
      fallback.push({x:gx-aw/2,y:gy-ah/2,w:aw,h:ah});
      fallback.push({x:gx2-aw/2,y:gy-ah/2,w:aw,h:ah});
      fallback.push({x:gx-aw/2,y:gy2-ah/2,w:aw,h:ah});
      fallback.push({x:gx2-aw/2,y:gy2-ah/2,w:aw,h:ah});
      // midpoints
      const cx=W/2, cy=(playTopY+H)/2;
      fallback.push({x:cx-aw/2,y:gy-ah/2,w:aw,h:ah});
      fallback.push({x:cx-aw/2,y:gy2-ah/2,w:aw,h:ah});
    }

    function okRect(r, forbid){
      // forbidden: obstacles + margins + bubble
      for(const f of forbid){ if(rectsOverlap(r,f)) return false; }
      // avoid UI
      for(const u of uiRectsPx().map(rr=>inflateRect(rr, 10*DPR))){
        if(rectsOverlap(r,u)) return false;
      }
      const rc=centerOf(r);
      // spacing among answers
      for(const a of answers){
        const ac={x:a.cx,y:a.cy};
        const dx=Math.abs(rc.x-ac.x);
        const dy=Math.abs(rc.y-ac.y);
        if(dist(rc,ac) < minDist) return false;
        if(dx < minDx && dy < minDy) return false;
      }
      // spacing from snake
      for(const p of snakeCentersPx()){
        if(dist(rc,p) < minSnakeDist) return false;
      }
      return true;
    }

    // progressive relaxation strategy
    let placedCount=0;
    const correctFirst = choices.slice(); // keep order; random already
    const relaxSteps = [
      {tries:5000, pad:inflatePad, minDist, minDx, minDy, minSnakeDist},
      {tries:5000, pad:inflatePad*0.85, minDist:minDist*0.90, minDx:minDx*0.90, minDy:minDy*0.90, minSnakeDist:minSnakeDist*0.90},
      {tries:5000, pad:inflatePad*0.70, minDist:minDist*0.82, minDx:minDx*0.80, minDy:minDy*0.80, minSnakeDist:minSnakeDist*0.82},
      {tries:5000, pad:inflatePad*0.55, minDist:minDist*0.72, minDx:minDx*0.70, minDy:minDy*0.70, minSnakeDist:minSnakeDist*0.72},
    ];

    for(const v of correctFirst){
      let placed=null;

      // try progressively relaxed constraints
      for(const step of relaxSteps){
        inflatePad = step.pad;
        minDist = step.minDist;
        minDx = step.minDx;
        minDy = step.minDy;
        minSnakeDist = step.minSnakeDist;

        const forbid = baseForbidden.map(r=>inflateRect(r, inflatePad));

        for(let tries=0; tries<step.tries; tries++){
          const c=randomCandidate();
          if(okRect(c, forbid)){ placed=c; break; }
        }
        if(placed) break;
      }

      // fallback points
      if(!placed){
        const forbid = baseForbidden.map(r=>inflateRect(r, inflatePad*0.5));
        for(const fb of fallback){
          if(okRect(fb, forbid)){ placed=fb; break; }
        }
      }

      // ultimate fallback: put at random ignoring spacing (but still forbidden)
      if(!placed){
        const forbid = baseForbidden.map(r=>inflateRect(r, 10*DPR));
        for(let tries=0; tries<12000; tries++){
          const c=randomCandidate();
          let ok=true;
          for(const f of forbid){ if(rectsOverlap(c,f)) { ok=false; break; } }
          if(!ok) continue;
          placed=c; break;
        }
      }

      // final absolute fallback: deterministic safe spot (guarantee not null)
      if(!placed){
        placed = {x:Math.max(marginEdge, 10*DPR), y:Math.max(playTopY+10*DPR, 10*DPR), w:aw, h:ah};
      }

      const cx = placed.x + placed.w/2;
      const cy = placed.y + placed.h/2;

      // reduced rect fallback (secondary)
      const hitScale=0.62;
      const hitW=placed.w*hitScale, hitH=placed.h*hitScale;
      const hit = { x: placed.x + (placed.w-hitW)/2, y: placed.y + (placed.h-hitH)/2, w: hitW, h: hitH };

      answers.push({
        x: placed.x, y: placed.y, w: placed.w, h: placed.h,
        hit,
        cx, cy,
        r: rAnswer,
        value: v,
        isCorrect: eqNum(Math.round(v*100)/100, correct)
      });

      placedCount++;
    }

    // hard guarantee
    if(answers.length !== 4){
      // rebuild minimal safe layout
      answers = [];
      const forbid = baseForbidden.map(r=>inflateRect(r, 10*DPR));
      for(let i=0;i<4;i++){
        const v=correctFirst[i] ?? correctFirst[0] ?? correct;
        let placed = fallback[i] || {x:W/2-aw/2,y:(playTopY+H)/2-ah/2,w:aw,h:ah};
        // ensure not forbidden (nudge if needed)
        for(let tries=0; tries<3000; tries++){
          if(!forbid.some(f=>rectsOverlap(placed,f))) break;
          placed = randomCandidate();
        }
        const cx=placed.x+placed.w/2, cy=placed.y+placed.h/2;
        const hitScale=0.62;
        const hitW=placed.w*hitScale, hitH=placed.h*hitScale;
        answers.push({
          x: placed.x, y: placed.y, w: placed.w, h: placed.h,
          hit:{x:placed.x+(placed.w-hitW)/2,y:placed.y+(placed.h-hitH)/2,w:hitW,h:hitH},
          cx, cy,
          r: rAnswer,
          value: v,
          isCorrect: eqNum(Math.round(v*100)/100, correct)
        });
      }
    }

    answersSpawnAt = performance.now();
  }

    for(let i=0;i<startLen;i++) snake.push({x:sx-i,y:sy});

  // Difficulty auto-increase every 5 correct answers (clamp 1..5)
  function autoDifficultyUp(){
    const target = 1 + Math.floor(score/5);
    if(target > diffLevel){
      diffLevel = clamp(target, 1, 5);
    }
  }

  // ============================
  // Collisions / bounce
  // ============================
  function hitsSelf(cx,cy){
    return snake.some((s,idx)=>idx!==0 && s.x===cx && s.y===cy);
  }

  function applyWrongPenalty(){
    penaltyMs += 10;
  }

  function shrinkSnake(){
    if(snake.length > 1) snake.pop();
  }

  function growSnake(n=1){
    for(let k=0;k<n;k++){
      const t=snake[snake.length-1];
      snake.push({x:t.x,y:t.y});
    }
  }

  function rectIntersects(a,b){
    return !(a.x+a.w < b.x || b.x+b.w < a.x || a.y+a.h < b.y || b.y+b.h < a.y);
  }
  function headRectPxAtCell(cx,cy){
    return {x:cx*CELL,y:cy*CELL,w:CELL,h:CELL};
  }

  function bounceDirection(fromDir, hx, hy){
    // Priorities: reverse, then orthogonals, then forward (rare)
    const cand=[
      {x:-fromDir.x,y:-fromDir.y},
      {x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0},
      {x:fromDir.x,y:fromDir.y},
    ];
    const uniq=[];
    const seen=new Set();
    for(const d of cand){
      const k=`${d.x},${d.y}`;
      if(!seen.has(k)){ seen.add(k); uniq.push(d); }
    }
    for(const d of uniq){
      let nx=hx+d.x, ny=hy+d.y;

      // wrap always ON
      if(nx<0) nx=COLS-1;
      if(nx>=COLS) nx=0;
      if(ny<0) ny=ROWS-1;
      if(ny>=ROWS) ny=0;

      // top forbidden
      if(ny < boardCells) continue;
      if(cellInObstacle(nx,ny)) continue;

      // bubble obstacle: must NOT stop game, just avoid
      if(bubbleRectPx && rectIntersects(headRectPxAtCell(nx,ny), bubbleRectPx)) continue;

      // self: avoid
      if(hitsSelf(nx,ny)) continue;

      return d;
    }
    return null;
  }

  // ============================
  // Circle collision
  // ============================
  function circleHitSnakeAnswer(headCx, headCy, snakeR, a){
    const dx = headCx - a.cx;
    const dy = headCy - a.cy;
    const d = Math.hypot(dx,dy);
    return d <= (snakeR + a.r);
  }

  // ============================
  // Step
  // ============================
  function step(){
    // apply queued growth (from cheat)
    if(cheatGrowQueued>0){
      growSnake(cheatGrowQueued);
      cheatGrowQueued=0;
    }

    dir=nextDir;

    const head=snake[0];
    let nx=head.x+dir.x;
    let ny=head.y+dir.y;

    // wrap always ON
    if(nx<0) nx=COLS-1;
    if(nx>=COLS) nx=0;
    if(ny<0) ny=ROWS-1;
    if(ny>=ROWS) ny=0;

    // forbid top zone
    if(ny < boardCells){
      const bd=bounceDirection(dir, head.x, head.y);
      if(bd){ dir=bd; nextDir={...bd}; }
      return;
    }

    // obstacles => bounce
    if(cellInObstacle(nx,ny)){
      const bd=bounceDirection(dir, head.x, head.y);
      if(bd){ dir=bd; nextDir={...bd}; }
      return;
    }

    // bubble obstacle => bounce (NEVER end)
    if(bubbleRectPx){
      const nextHeadPx=headRectPxAtCell(nx,ny);
      if(rectIntersects(nextHeadPx, bubbleRectPx)){
        const bd=bounceDirection(dir, head.x, head.y);
        if(bd){ dir=bd; nextDir={...bd}; }
        return;
      }
    }

    // self => bounce (avoid being stuck)
    if(hitsSelf(nx,ny)){
      const bd=bounceDirection(dir, head.x, head.y);
      if(bd){ dir=bd; nextDir={...bd}; }
      return;
    }

    // move
    snake.unshift({x:nx,y:ny});

    // stall watchdog (if head never changes cell)
    const hk = `${snake[0].x},${snake[0].y}`;
    if(hk === lastHeadCellKey) stillFrames++;
    else { stillFrames=0; lastHeadCellKey=hk; }
    if(stillFrames > 180){ // ~3s at 60fps
      updateBestIfNeeded();
      screen=SC.FIN;
      return;
    }

    // answer collision (circle primary, rect fallback)
    if(answers && answers.length===4){
      const headCx = snake[0].x*CELL + CELL/2;
      const headCy = snake[0].y*CELL + CELL/2;
      const snakeR = 0.45*CELL;

      let pickedIdx = -1;
      for(let i=0;i<answers.length;i++){
        const a=answers[i];
        if(circleHitSnakeAnswer(headCx, headCy, snakeR, a)){ pickedIdx=i; break; }
      }
      if(pickedIdx===-1){
        // fallback rect (reduced hit)
        const hr = {x:snake[0].x*CELL, y:snake[0].y*CELL, w:CELL, h:CELL};
        pickedIdx = answers.findIndex(a=>a && a.hit && rectIntersects(hr,a.hit));
      }

      if(pickedIdx!==-1){
        const tNow=performance.now();

        // ignore very quick spawn pickups
        if(tNow - answersSpawnAt < PICKUP_IGNORE_MS){
          snake.pop();
          return;
        }

        const picked=answers[pickedIdx];
        const tempsSec = Math.max(0, (tNow - qStartTime)/1000);

        const activeCheatsNow = [
          cheat194Active ? "194" : "",
          (cheatSpeedMult>1.0) ? "+++" : "",
          (cheatSpeedMult<1.0) ? "---" : "",
          (cheatDiffBoost>0) ? "***" : ""
        ].filter(Boolean).join(",");

        if(picked && picked.isCorrect){
          logAttempt({
            chap: currentQ.chap,
            niveau: diffLevel,
            question: currentQ.text,
            correct: currentQ.answer,
            chosen: picked.value,
            result: "bon",
            tempsSec,
            cheatFlags: activeCheatsNow
          });

          score++;
          autoDifficultyUp();
          growSnake(1);

          profBubbleTimer=2.0;
          profBubbleText="Bonne réponse !";
          sfxBon();
          mauvaisesSuite=0;

          nextQuestion();
        } else {
          logAttempt({
            chap: currentQ.chap,
            niveau: diffLevel,
            question: currentQ.text,
            correct: currentQ.answer,
            chosen: picked ? picked.value : "—",
            result: "faux",
            tempsSec,
            cheatFlags: activeCheatsNow
          });

          sfxFaux();
          applyWrongPenalty();
          shrinkSnake();
          lives--;
          mauvaisesSuite++;

          if(lives<=0 || mauvaisesSuite>=3){
            updateBestIfNeeded();
            screen=SC.FIN;
            return;
          }
          nextQuestion();
        }

        snake.pop();
        return;
      }
    }

    // normal
    snake.pop();
  }

  // ============================
  // Chrono (mandatory)
  // ============================
  function tickChrono(dt){
    secAcc += dt;
    while(secAcc>=1){
      secAcc-=1;
      timeLeft--;
      if(timeLeft<=0){
        const tNow=performance.now();
        const tempsSec = Math.max(0, (tNow - qStartTime)/1000);

        const activeCheatsNow = [
          cheat194Active ? "194" : "",
          (cheatSpeedMult>1.0) ? "+++" : "",
          (cheatSpeedMult<1.0) ? "---" : "",
          (cheatDiffBoost>0) ? "***" : ""
        ].filter(Boolean).join(",");

        logAttempt({
          chap: currentQ.chap,
          niveau: diffLevel,
          question: currentQ.text,
          correct: currentQ.answer,
          chosen: "timeout",
          result: "temps écoulé",
          tempsSec,
          cheatFlags: activeCheatsNow
        });

        updateBestIfNeeded();
        screen=SC.FIN;
        break;
      }
    }
  }

  // ============================
  // Rendering (classroom)
  // ============================
  function drawBackground(){
    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,W,H);

    // parquet below topbar
    const plankW=Math.max(12*DPR, Math.floor(CELL*0.8));
    for(let x=0;x<W;x+=plankW){
      const alt=(Math.floor(x/plankW)%2===0);
      ctx.fillStyle=alt ? "rgba(193,138,86,0.28)" : "rgba(193,138,86,0.22)";
      ctx.fillRect(x, topBarH, plankW, H-topBarH);
      ctx.fillStyle="rgba(120,80,40,0.08)";
      ctx.fillRect(x+plankW-1, topBarH, 1, H-topBarH);
    }

    // topBar area (outside class)
    ctx.fillStyle="rgba(245,246,250,1)";

  function wrapText(text,maxW,c){
    const words=String(text).split(" ");
    const lines=[];
    let line="";
    for(const w of words){
      const test=line?(line+" "+w):w;
      if(c.measureText(test).width<=maxW) line=test;
      else{ if(line) lines.push(line); line=w; }
    }
    if(line) lines.push(line);
    return lines;
  }

  function computeBilan(){
    const chapList=["EQUATION","POURCENTAGES","CALCUL_MENTAL","CONVERSIONS","CARRE"];
    const stats={};
    for(const c of chapList) stats[c]={total:0,bon:0,faux:0,timeout:0,temps:0};
    const global={total:0,bon:0,faux:0,timeout:0,temps:0};

    for(const r of logRows){
      const c=r.chapitre;
      if(!stats[c]) stats[c]={total:0,bon:0,faux:0,timeout:0,temps:0};
      stats[c].total++; global.total++;
      const t=Number(r.temps_par_question_s)||0;
      stats[c].temps+=t; global.temps+=t;

      if(r.resultat==="bon"){ stats[c].bon++; global.bon++; }
      else if(r.resultat==="temps écoulé"){ stats[c].timeout++; global.timeout++; }
      else { stats[c].faux++; global.faux++; }
    }

    const taux=(s)=>s.total?Math.round((s.bon/s.total)*100):0;
    const tpsMoy=(s)=>s.total?Math.round((s.temps/s.total)*100)/100:0;

    return {stats, global, taux, tpsMoy};
  }

    const x=(W-w)/2, y=(H-h)/2;
    drawCard(x,y,w,h,0.95);

    ctx.fillStyle="#111";
    ctx.textAlign="center";
    ctx.textBaseline="top";
    ctx.font=`900 ${Math.floor(24*DPR)}px system-ui`;
    ctx.fillText("Erreur interne", x+w/2, y+16*DPR);

    ctx.fillStyle="rgba(0,0,0,0.70)";
    ctx.font=`900 ${Math.floor(13*DPR)}px system-ui`;
    const lines = wrapText(String(crashMsg||"Une erreur est survenue."), w-60*DPR, ctx);
    for(let i=0;i<Math.min(lines.length,4);i++){
      ctx.fillText(lines[i], x+w/2, y+56*DPR+i*(18*DPR));
    }

    drawButton("btn_crash_menu", x+w*0.25, y+h-70*DPR, w*0.50, 52*DPR, "Retour menu", {primary:true, alpha:0.92});
    ctx.restore();
  }

  // ============================
  // Export CSV + Export HTML
  // ============================
  function exportCSV(){
    const sep=";";
    const nom=studentName.trim()||"(sans nom)";
    const cls=studentClass.trim()||"(sans classe)";
    const date=nowStampFR();

    const {stats, global, taux, tpsMoy} = computeBilan();

    const cleanCell = (s) => String(s ?? "")
      .replace(/\r?\n/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    const lines=[];

    lines.push(["FICHE DE RÉSULTATS – MATHS SNAKE"].join(sep));
    lines.push([]);

    lines.push(["IDENTITÉ & PARAMÈTRES"].join(sep));
    lines.push(["Nom", escapeCSV(nom)].join(sep));
    lines.push(["Classe", escapeCSV(cls)].join(sep));
    lines.push(["Date", escapeCSV(date)].join(sep));
    lines.push(["Chapitres cochés", escapeCSV(enabledChaptersList().join("+"))].join(sep));
    lines.push(["Difficulté finale (sur 5)", `${diffLevel}`].join(sep));
    lines.push(["Chronomètre / question (s)", `${chronoS}`].join(sep));
    lines.push(["Vitesse réglée (ms/tick)", `${getTickManual()}`].join(sep));
    lines.push(["Cheatcodes utilisés", escapeCSV(cheatUsed.length ? cheatUsed.map(c=>`${c.code}@${c.time}`).join(" | ") : "aucun")].join(sep));
    lines.push([]);

    lines.push(["TABLEAU 1 – QUESTIONS POSÉES"].join(sep));
    lines.push([
      "N°","Chapitre","Niveau","Question","Bonne réponse","Réponse élève","Résultat","Temps par question (s)","Cheatcodes actifs"
    ].join(sep));

    for(const r of logRows){
      lines.push([
        r.index,
        escapeCSV(cleanCell(r.chapitre)),
        escapeCSV(cleanCell(r.niveau)),
        escapeCSV(cleanCell(r.question)),
        escapeCSV(cleanCell(r.bonne_reponse)),
        escapeCSV(cleanCell(r.reponse_eleve)),
        escapeCSV(cleanCell(r.resultat)),
        escapeCSV(cleanCell(r.temps_par_question_s)),
        escapeCSV(cleanCell(r.cheatcodes_actifs||""))
      ].join(sep));
    }

    lines.push([]);
    lines.push(["TABLEAU 2 – BILAN (PAR CHAPITRE + GLOBAL)"].join(sep));
    lines.push([
      "Chapitre","Total","Bonnes","Fausses","Temps écoulé","Taux de bonnes réponses","Temps total (s)","Temps moyen (s)"
    ].join(sep));

    const chapList=["EQUATION","POURCENTAGES","CALCUL_MENTAL","CONVERSIONS","CARRE"];
    for(const k of chapList){
      const s=stats[k]||{total:0,bon:0,faux:0,timeout:0,temps:0};
      lines.push([
        escapeCSV(k), s.total, s.bon, s.faux, s.timeout,
        `${taux(s)}%`, fmt(Math.round(s.temps*100)/100), fmt(tpsMoy(s))
      ].join(sep));
    }

    lines.push([
      "GLOBAL", global.total, global.bon, global.faux, global.timeout,
      `${taux(global)}%`, fmt(Math.round(global.temps*100)/100), fmt(tpsMoy(global))
    ].join(sep));

    const csv="\uFEFF"+lines.join("\n");
    const fileName=safeFileName(`MathsSnake_${nom}_${cls}.csv`);
    downloadBlob(csv, "text/csv;charset=utf-8", fileName);
  }

  function exportHTML(){
    const nom=studentName.trim()||"(sans_nom)";
    const cls=studentClass.trim()||"(sans_classe)";
    const html = document.documentElement.outerHTML;
    const fileName = safeFileName(`MathsSnake_${nom}_${cls}.html`);
    downloadBlob(html, "text/html;charset=utf-8", fileName);
  }

  function tryFullscreen(){
    const el = document.documentElement;
    if(!document.fullscreenElement && el.requestFullscreen){
      el.requestFullscreen().catch(()=>{});
    }
  }

  // ============================
  // Buttons / UI actions
  // ============================
  let pointerDown=false;
  let activeSlider=null;

  function pointerPos(e){
    const r=canvas.getBoundingClientRect();
    return {x:(e.clientX-r.left)*DPR, y:(e.clientY-r.top)*DPR};
  }
  function sliderValueFromPointer(sl, px){
    const pad=12*DPR;
    const railX=sl.x+pad;
    const railW=sl.w-2*pad;
    return clamp((px-railX)/railW,0,1);
  }
  function applySlider(id, v){
    if(id==="s_speed") speed01=v;
    if(id==="s_chrono") chrono01=v;
    if(id==="s_diff") diff01=v;
    if(screen===SC.PLAY){
      baseTick=getTickManual();
    }
  }

  function toggleCheck(id){
    if(id==="chk_full"){
      autoFullscreen = !autoFullscreen;
      return;
    }
    if(id.startsWith("chk_")){
      const key=id.replace("chk_","");
      chapEnabled.set(key, !chapEnabled.get(key));
    }
  }

  function handleButton(id){
    if(id==="link_site"){
      window.open("https://mathsxp.odoo.com/", "_blank");
      return;
    }
    if(id==="btn_fullscreen"){
      tryFullscreen();
      return;
    }
    if(id==="btn_export_html_top" || id==="btn_export_html_menu" || id==="btn_export_html"){
      exportHTML();
      return;
    }
    if(id==="btn_pause"){ screen=SC.PAUSE; return; }
    if(id==="btn_restart"){ initRun(); screen=SC.PLAY; return; }

    if(id==="btn_next"){ screen=SC.MENU2; focusedInput=null; return; }
    if(id==="btn_back"){ screen=SC.MENU1; focusedInput=null; return; }

    if(id==="btn_start"){
      if(autoFullscreen) tryFullscreen();
      initRun();
      screen=SC.PLAY;
      return;
    }

    if(id==="btn_reprendre"){ screen=SC.PLAY; return; }
    if(id==="btn_recommencer"){ initRun(); screen=SC.PLAY; return; }
    if(id==="btn_menu"){ screen=SC.MENU1; focusedInput=null; return; }

    if(id==="btn_rejouer"){ initRun(); screen=SC.PLAY; return; }
    if(id==="btn_menu_fin"){ screen=SC.MENU1; focusedInput=null; return; }
    if(id==="btn_export_csv"){ exportCSV(); return; }

    if(id==="btn_crash_menu"){
      crashMsg="";
      screen=SC.MENU1;
      focusedInput=null;
      return;
    }
  }

  canvas.addEventListener("pointerdown",(e)=>{
    ensureAudio();
    pointerDown=true;
    canvas.setPointerCapture(e.pointerId);
    const p=pointerPos(e);
    const h=hit(p.x,p.y);

    if(!h){ focusedInput=null; return; }

    if(h.type==="input"){
      focusedInput = (h.id==="inp_name") ? "name" : "class";
      return;
    }
    if(h.type==="slider"){
      activeSlider=h.id;
      applySlider(h.id, sliderValueFromPointer(h, p.x));
      return;
    }
    if(h.type==="check"){
      toggleCheck(h.id);
      return;
    }
    if(h.type==="button" && !h.disabled){
      handleButton(h.id);
    }
  });
  canvas.addEventListener("pointermove",(e)=>{
    if(!pointerDown || !activeSlider) return;
    const p=pointerPos(e);
    const sl=ui.find(u=>u.id===activeSlider);
    if(!sl) return;
    applySlider(activeSlider, sliderValueFromPointer(sl, p.x));
  });
  canvas.addEventListener("pointerup",()=>{
    pointerDown=false;
    activeSlider=null;
  });

  // ============================
  // Cheat code detection
  // ============================
  function handleCheatBuffer(){
    // keep last 8 chars
    if(cheatBuffer.length>8) cheatBuffer = cheatBuffer.slice(-8);

    if(cheatBuffer.endsWith("+++")){
      cheatSpeedMult *= 1.5;
      cheatSpeedMult = clamp(cheatSpeedMult, 0.25, 3.0);
      markCheat("+++", "vitesse +50%");
      cheatBuffer="";
    } else if(cheatBuffer.endsWith("---")){
      cheatSpeedMult /= 1.5;
      cheatSpeedMult = clamp(cheatSpeedMult, 0.25, 3.0);
      markCheat("---", "vitesse -50%");
      cheatBuffer="";
    } else if(cheatBuffer.endsWith("***")){
      cheatGrowQueued += 2;
      // optional difficulty boost
      diffLevel = clamp(diffLevel+1, 1, 5);
      cheatDiffBoost++;
      markCheat("***", "grandir +2 & diff +1");
      cheatBuffer="";
    } else if(cheatBuffer.endsWith("194")){
      // 194 => highlight correct answer
      cheat194Active = true;
      correctHighlight = true;
      markCheat("194", "bonne réponse visible");
      cheatBuffer="";
    }
  }

  // ============================
  // Keyboard
  // ============================
  window.addEventListener("keydown",(e)=>{
    ensureAudio();

    // global shortcuts
    if(e.key==="Escape" || e.key==="m" || e.key==="M"){
      if(screen!==SC.MENU1){
        e.preventDefault();
        screen=SC.MENU1;
        focusedInput=null;
      }
      return;
    }
    if(e.key==="h" || e.key==="H"){
      // allow everywhere
      e.preventDefault();
      exportHTML();
      return;
    }
    if(e.key==="r" || e.key==="R"){
      if(screen===SC.PLAY || screen===SC.PAUSE || screen===SC.FIN){
        e.preventDefault();
        initRun();
        screen=SC.PLAY;
      }
      return;
    }

    // capture cheat characters only in PLAY/PAUSE/FIN (not in text inputs)
    if((screen===SC.PLAY || screen===SC.PAUSE || screen===SC.FIN) && e.key.length===1){
      const ch=e.key;
      if(/[0-9\+\-\*]/.test(ch)){
        cheatBuffer += ch;
        handleCheatBuffer();
      }
    }

    if(screen===SC.MENU1 || screen===SC.MENU2){
      if(screen===SC.MENU1 && e.key==="Tab"){
        e.preventDefault();
        if(!focusedInput) focusedInput="name";
        else if(focusedInput==="name") focusedInput="class";
        else focusedInput="name";
        return;
      }
      if(focusedInput){
        if(e.key==="Backspace"){
          e.preventDefault();
          if(focusedInput==="name") studentName=studentName.slice(0,-1);
          if(focusedInput==="class") studentClass=studentClass.slice(0,-1);
          return;
        }
        if(e.key==="Enter"){
          e.preventDefault();
          focusedInput=(focusedInput==="name")?"class":null;
          return;
        }
        if(e.key.length===1){
          const ch=e.key;
          const ok=/[a-zA-Z0-9À-ÿ \-_'’.]/.test(ch);
          if(!ok) return;
          if(focusedInput==="name" && studentName.length<24) studentName+=ch;
          if(focusedInput==="class" && studentClass.length<16) studentClass+=ch;
        }
      }
      return;
    }

    if(screen===SC.PLAY){
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
      if(e.key===" "){ screen=SC.PAUSE; return; }

      // anti demi-tour
      if(e.key==="ArrowUp" && dir.y!==1) nextDir={x:0,y:-1};
      if(e.key==="ArrowDown" && dir.y!==-1) nextDir={x:0,y:1};
      if(e.key==="ArrowLeft" && dir.x!==1) nextDir={x:-1,y:0};
      if(e.key==="ArrowRight" && dir.x!==-1) nextDir={x:1,y:0};
      return;
    }

    if(screen===SC.PAUSE){
      if(e.key===" "){ e.preventDefault(); screen=SC.PLAY; }
      return;
    }
  });

  // ============================
  // Main loop (rAF + accumulator)
  // ============================
  let last=performance.now();
  let acc=0;

  function safeRun(fn){
    try{ fn(); }
    catch(err){
      crashMsg = (err && err.stack) ? err.stack : String(err);
      screen = SC.CRASH;
    }
  }

  function computeTickMs(){
    // base from slider + penalty, apply cheatSpeedMult
    const base = getTickManual();
    const raw = Math.round((base - penaltyMs) / cheatSpeedMult);
    return clamp(raw, 20, 350);
  }

  function loop(t){
    const dt=Math.min(0.05, (t-last)/1000);
    last=t;

    clearUI();

    safeRun(()=>drawBackground());
    safeRun(()=>{ drawFurniture(); drawTables(); });

    if(screen===SC.MENU1 || screen===SC.MENU2){
      bubbleRectPx = null;
      if(screen===SC.MENU1) safeRun(()=>drawMenu1());
      else safeRun(()=>drawMenu2());
    } else if(screen===SC.CRASH){
      safeRun(()=>drawCrash());
    } else {
      // bubble timer
      if(profBubbleTimer>0) profBubbleTimer=Math.max(0, profBubbleTimer-dt);

      safeRun(()=>drawProfessor());
      safeRun(()=>{ if(currentQ) drawQuestionOnBoard(); });
      safeRun(()=>drawTopBarHUD());

      if(screen===SC.PLAY){
        tickMs = computeTickMs();

        safeRun(()=>tickChrono(dt));
        safeRun(()=>drawAnswers());
        safeRun(()=>drawSnake());

        acc += dt*1000;
        while(acc >= tickMs && screen===SC.PLAY){
          acc -= tickMs;
          safeRun(()=>step());
          if(screen!==SC.PLAY) break;
        }
      }

      if(screen===SC.PAUSE){
        safeRun(()=>{ drawAnswers(); drawSnake(); drawPause(); });
      }

      if(screen===SC.FIN){
        safeRun(()=>drawFin());
      }
    }

    requestAnimationFrame(loop);
  }

  // ============================
  // Init
  // ============================
  resize();
  buildFixedObstacles();
  // set default options
  // default: all chapters enabled (already), chrono 30 (already), speed default 150 (already), diff default 1
  diff01 = 0.0;
  // auto fullscreen at first start: handled on btn_start
  requestAnimationFrame(loop);

})();
// Auteur : Tom Rougeaud
</script>
